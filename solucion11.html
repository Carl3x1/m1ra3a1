<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Secuencia Numérica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            background-image: radial-gradient(circle at top right, #1e1b4b, #0f172a);
        }

        .container {
            background-color: var(--surface);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border);
            transition: transform 0.3s ease;
        }
        
        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            margin: 0 0 10px 0;
            font-weight: 800;
            font-size: 28px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.description {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 15px;
            line-height: 1.5;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
        }

        input {
            background-color: #0f172a;
            border: 2px solid var(--border);
            color: var(--text-primary);
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }
        
        button {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
        }

        button:hover {
            background: linear-gradient(135deg, var(--primary-hover), #7c3aed);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        #resultado {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            display: none;
            word-wrap: break-word;
            line-height: 1.6;
            max-height: 250px;
            overflow-y: auto;
        }
        
        /* Custom scrollbar for result box */
        #resultado::-webkit-scrollbar {
            width: 8px;
        }
        #resultado::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 8px;
        }
        #resultado::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 8px;
        }
        #resultado::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        .number-tag {
            display: inline-block;
            background-color: var(--surface);
            padding: 4px 10px;
            border-radius: 6px;
            margin: 4px;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid var(--border);
            color: #a78bfa;
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
            transform: translateY(5px);
        }

        .error {
            color: #f87171;
            font-weight: 600;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Secuencia Numérica</h1>
        <p class="description">Ingresa un valor numérico y generaremos una secuencia continua desde el número uno hasta el valor que elijas.</p>
        
        <div class="input-group">
            <label for="numero">Valor numérico mayor a 0</label>
            <input type="number" id="numero" placeholder="Ej: 10" min="1" onkeypress="if(event.key === 'Enter') generarNumeros()">
        </div>

        <button onclick="generarNumeros()">Generar Secuencia</button>

        <div id="resultado"></div>
    </div>

    <script src="js/solucion11.js"></script>
</body>
</html>
